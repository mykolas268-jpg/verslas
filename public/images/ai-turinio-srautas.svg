<svg viewBox="0 0 1200 750" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AI turinio generavimo srauto schema">
  <defs>
    <linearGradient id="step" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f0fbf8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="750" fill="#f7f5f1"/>
  <rect x="1" y="1" width="1198" height="748" fill="none" stroke="#e3ded6" stroke-width="2"/>

  <text x="80" y="100" font-family="Georgia, 'Times New Roman', serif" font-size="40" fill="#1a1815">Nuo duomenų iki aprašymo</text>
  <rect x="80" y="120" width="64" height="5" rx="2.5" fill="#0d6e63"/>

  <g font-family="ui-sans-serif, system-ui, sans-serif">
    <!-- box 1 -->
    <g transform="translate(80 250)">
      <rect width="300" height="230" rx="22" fill="url(#step)" stroke="#e3ded6" stroke-width="2"/>
      <circle cx="46" cy="50" r="20" fill="#0d6e63"/>
      <text x="46" y="58" text-anchor="middle" font-size="22" fill="#ffffff" font-weight="700">1</text>
      <text x="36" y="120" font-size="26" fill="#1a1815" font-weight="700">Produkto</text>
      <text x="36" y="152" font-size="26" fill="#1a1815" font-weight="700">duomenys</text>
      <text x="36" y="190" font-size="18" fill="#66625b">pavadinimas, savybės,</text>
      <text x="36" y="214" font-size="18" fill="#66625b">medžiaga, dydis</text>
    </g>

    <!-- arrow -->
    <g stroke="#0d6e63" stroke-width="4" fill="#0d6e63">
      <path d="M398 365h70" stroke-linecap="round"/>
      <path d="M468 365l-16-10v20z"/>
    </g>

    <!-- box 2 -->
    <g transform="translate(490 250)">
      <rect width="300" height="230" rx="22" fill="#0d6e63"/>
      <circle cx="46" cy="50" r="20" fill="#ffffff"/>
      <text x="46" y="58" text-anchor="middle" font-size="22" fill="#0d6e63" font-weight="700">2</text>
      <text x="36" y="120" font-size="26" fill="#ffffff" font-weight="700">AI promptas</text>
      <text x="36" y="160" font-size="18" fill="#cdeee8">vaidmuo + tonas +</text>
      <text x="36" y="184" font-size="18" fill="#cdeee8">taisyklės + duomenys</text>
      <text x="36" y="208" font-size="18" fill="#cdeee8">= vienodas šablonas</text>
    </g>

    <!-- arrow -->
    <g stroke="#0d6e63" stroke-width="4" fill="#0d6e63">
      <path d="M808 365h70" stroke-linecap="round"/>
      <path d="M878 365l-16-10v20z"/>
    </g>

    <!-- box 3 -->
    <g transform="translate(900 250)">
      <rect width="220" height="230" rx="22" fill="url(#step)" stroke="#e3ded6" stroke-width="2"/>
      <circle cx="46" cy="50" r="20" fill="#0d6e63"/>
      <text x="46" y="58" text-anchor="middle" font-size="22" fill="#ffffff" font-weight="700">3</text>
      <text x="36" y="120" font-size="26" fill="#1a1815" font-weight="700">Aprašymas</text>
      <text x="36" y="160" font-size="18" fill="#66625b">paruoštas,</text>
      <text x="36" y="184" font-size="18" fill="#66625b">SEO draugiškas,</text>
      <text x="36" y="208" font-size="18" fill="#66625b">vientiso stiliaus</text>
    </g>
  </g>

  <text x="80" y="560" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" letter-spacing="2" fill="#0d6e63">// tą patį šabloną kartoji visiems produktams</text>
</svg>
