<svg viewBox="0 0 1200 750" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Dirbtinis intelektas produktų aprašymams">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#114b54"/>
      <stop offset="1" stop-color="#0a2f3a"/>
    </linearGradient>
    <radialGradient id="glow2" cx="0.2" cy="0.2" r="0.7">
      <stop offset="0" stop-color="#34d3c0" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#34d3c0" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots2" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#a7eee6" fill-opacity="0.12"/>
    </pattern>
  </defs>

  <rect width="1200" height="750" fill="url(#bg2)"/>
  <rect width="1200" height="750" fill="url(#dots2)"/>
  <rect width="1200" height="750" fill="url(#glow2)"/>

  <!-- product card -->
  <g>
    <rect x="690" y="170" width="380" height="410" rx="28" fill="#ffffff" fill-opacity="0.10"/>
    <rect x="690" y="170" width="380" height="410" rx="28" fill="none" stroke="#bdeee8" stroke-opacity="0.25" stroke-width="1.5"/>
    <rect x="726" y="206" width="308" height="180" rx="16" fill="#16b8a4" fill-opacity="0.85"/>
    <rect x="726" y="410" width="240" height="16" rx="8" fill="#d8f5f0" fill-opacity="0.85"/>
    <rect x="726" y="442" width="308" height="12" rx="6" fill="#d8f5f0" fill-opacity="0.45"/>
    <rect x="726" y="468" width="280" height="12" rx="6" fill="#d8f5f0" fill-opacity="0.45"/>
    <rect x="726" y="494" width="300" height="12" rx="6" fill="#d8f5f0" fill-opacity="0.45"/>
    <rect x="726" y="534" width="120" height="30" rx="15" fill="#7ee7d6"/>
  </g>

  <!-- generating lines -->
  <g stroke="#7ee7d6" stroke-opacity="0.5" stroke-width="3" stroke-linecap="round">
    <path d="M150 300h360"/>
    <path d="M150 350h300"/>
    <path d="M150 400h340"/>
  </g>

  <!-- spark -->
  <g transform="translate(160 150)" fill="#bdeee8" fill-opacity="0.9">
    <path d="M36 0c3.6 27 10.8 34.2 37.8 37.8C46.8 41.4 39.6 48.6 36 75.6 32.4 48.6 25.2 41.4-1.8 37.8 25.2 34.2 32.4 27 36 0Z"/>
  </g>

  <!-- label -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#bdeee8">
    <rect x="150" y="560" width="14" height="14" rx="3" fill="#34d3c0"/>
    <text x="178" y="572" font-size="26" letter-spacing="6" fill-opacity="0.9">AI · PRODUKTAI</text>
  </g>
</svg>
